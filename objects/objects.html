<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>分镜 · 网球用品店</title>
<style>
  @font-face {
    font-family: "PFanHuTu";
    src: url("../PFanHuTuTi 0.680.ttf") format("truetype");
    font-display: swap;
  }

  :root {
    --ink: #2b2a26;
    --line: #2b2a26;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    height: 100%;
  }

  body {
    font-family: "PFanHuTu", "KaiTi", "STKaiti", serif;
    color: var(--ink);
    background: #f6f1e8;
    min-height: 100vh;
    display: flex;
    align-items: stretch;
  }

  .squiggle-defs { position: absolute; width: 0; height: 0; }

  .stage {
    width: 100%;
    min-height: 100vh;
    display: flex;
    align-items: center;
    gap: clamp(12px, 2vw, 36px);
    padding: clamp(20px, 4vw, 52px);
  }

  /* ---------- 左侧：叙事文本 ---------- */
  .content {
    flex: 1 1 50%;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    gap: 0;
  }

  .narrative {
    position: relative;
    padding: clamp(18px, 2.4vw, 28px) clamp(8px, 1.2vw, 16px);
    line-height: 2.05;
    font-size: clamp(17px, 1.55vw, 23px);
    letter-spacing: 0.4px;
    transform: rotate(-0.4deg);
    width: 100%;
  }

  .narrative p {
    margin: 0;
    min-height: 2em;
    visibility: hidden;
  }

  .narrative p.blank {
    min-height: 1em;
    visibility: visible;
  }

  /* ---------- 右侧：散落图品 ---------- */
  .illus {
    flex: 1 1 50%;
    align-self: stretch;
    position: relative;
    min-height: 480px;
  }

  .illus img {
    position: absolute;
    cursor: pointer;
    transition: transform 0.2s ease, filter 0.2s ease;
    filter: drop-shadow(2px 4px 6px rgba(0,0,0,0.08));
  }

  .illus img:hover {
    transform: scale(1.06) rotate(1.5deg);
    filter: drop-shadow(4px 8px 12px rgba(0,0,0,0.15));
  }

  /* 各图片位置 */
  #img-shirt {
    width: 40%;
    top: 0%;
    right: 10%;
  }

  #img-dress {
    width: 36%;
    top: 10%;
    left: 10%;
  }

  #img-shoe {
    width: 32%;
    top: 42%;
    right: 2%;
  }

  #img-bag {
    width: 62%;
    bottom: 0%;
    left: 14%;
  }

  /* ---------- 底部提示小字 ---------- */
  .hint-bar {
    position: fixed;
    bottom: clamp(12px, 2vh, 22px);
    right: clamp(20px, 4vw, 56px);
    font-size: clamp(12px, 1vw, 15px);
    color: #8a8270;
    letter-spacing: 0.5px;
    opacity: 0;
    transition: opacity 0.8s ease;
    white-space: nowrap;
    pointer-events: none;
  }

  .hint-bar.show {
    opacity: 1;
    pointer-events: auto;
  }

  .hint-bar::before {
    content: "▸ ";
    opacity: 0.6;
  }

  /* ---------- 响应式 ---------- */
  @media (max-width: 860px) {
    .stage {
      flex-direction: column;
      justify-content: flex-start;
      padding-top: clamp(24px, 5vw, 48px);
    }
    .content { flex: none; width: 100%; }
    .illus {
      flex: none;
      width: 100%;
      min-height: 56vw;
    }
    .narrative { font-size: clamp(14px, 3.8vw, 18px); }
  }
</style>
</head>
<body>

  <svg class="squiggle-defs" aria-hidden="true">
    <filter id="hand-drawn">
      <feTurbulence type="fractalNoise" baseFrequency="0.02" numOctaves="3" result="noise" seed="7" />
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="3.5" xChannelSelector="R" yChannelSelector="G" />
    </filter>
  </svg>

  <main class="stage">
    <!-- 左侧：打字叙事 -->
    <section class="content">
      <div class="narrative">
        <p id="p0">你接受了网球用品总裁的晚餐邀请。</p>
        <p id="p1">那一晚，他没有只和你聊比赛，</p>
        <p class="blank"></p>
        <p id="p2">而是聊起了网球之外的另一片赛场：</p>
        <p id="p3">球拍、球鞋、运动服、网球裙……</p>
        <p id="p4">这些曾经只是比赛装备的东西，</p>
        <p id="p5">正在成为年轻人日常生活里的时尚符号。</p>
        <p class="blank"></p>
        <p id="p6">你意识到，</p>
        <p id="p7">职业网球带来的不只是奖杯和奖金，</p>
        <p id="p8">还有被看见之后产生的商业影响力。</p>
        <p class="blank"></p>
        <p id="p9">你决定开一家属于自己的网球用品店。</p>
        <p id="p10">而时代的蓝海，正好向你打开。</p>
        <p class="blank"></p>
        <p id="p11">越来越多人开始走进球场，</p>
        <p id="p12">也越来越多人开始购买属于自己的第一件网球装备。</p>
      </div>
    </section>

    <!-- 右侧：网球用品散落展示 -->
    <section class="illus">
      <img id="img-shirt" src="shirt.png" alt="网球polo衫"
           data-item="shirt" title="点击了解更多" />
      <img id="img-dress" src="dress.png" alt="网球裙"
           data-item="dress" title="点击了解更多" />
      <img id="img-shoe" src="shoe.png" alt="网球鞋"
           data-item="shoe" title="点击了解更多" />
      <img id="img-bag" src="bag.png" alt="网球包"
           data-item="bag" title="点击了解更多" />
    </section>
  </main>

  <!-- 底部提示小字 -->
  <div class="hint-bar" id="hint-bar">点击看看 2024 年网球市场的快速扩张</div>

  <script>
    /* ---------- 打字机效果（与 sad.html 统一） ---------- */
    function typewriterNarrative(onDone) {
      const ids = ["p0","p1","p2","p3","p4","p5","p6","p7","p8","p9","p10","p11","p12"];
      const paras = ids.map(id => document.getElementById(id));

      const texts = paras.map(p => {
        const t = p.textContent;
        p.textContent = "";
        return t;
      });

      let paraIndex = 0;
      let charIndex = 0;

      function typeNext() {
        if (paraIndex >= paras.length) {
          if (onDone) onDone();
          return;
        }
        const p = paras[paraIndex];
        p.style.visibility = "visible";

        if (charIndex < texts[paraIndex].length) {
          p.textContent += texts[paraIndex][charIndex];
          charIndex++;
          setTimeout(typeNext, 80);
        } else {
          paraIndex++;
          charIndex = 0;
          setTimeout(typeNext, 200);
        }
      }

      typeNext();
    }

    /* 打字完成后显示底部提示 */
    typewriterNarrative(() => {
      setTimeout(() => {
        document.getElementById("hint-bar").classList.add("show");
      }, 400);
    });

    /* ---------- 图片点击（预留跳转接口） ---------- */
    document.querySelectorAll(".illus img").forEach(img => {
      img.addEventListener("click", () => {
        const item = img.dataset.item;
        /* TODO: 同学在此接入跳转逻辑，例如：
           if (item === "shirt") location.href = "shirt_detail.html";
        */
        console.log("clicked:", item);
      });
    });
  </script>
</body>
</html>
