<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>最终结局 · 世界冠军</title>
<style>
  @font-face {
    font-family: "PFanHuTu";
    src: url("../PFanHuTuTi 0.680.ttf") format("truetype");
    font-display: swap;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%;
    height: 100%;
  }

  body {
    font-family: "PFanHuTu", "KaiTi", "STKaiti", serif;
    background: #F6F1E8;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  /* ---- 翻转卡片容器 ---- */
  .flip-scene {
    perspective: 1200px;
    cursor: pointer;
    position: relative;
    width: min(100vw, 1200px);
  }

  .flip-card {
    width: 100%;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.85s cubic-bezier(0.4, 0.0, 0.2, 1);
    transform-origin: center center;
  }

  .flip-scene.opened .flip-card {
    transform: rotateY(-180deg);
  }

  .flip-face {
    width: 100%;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
  }

  .flip-face img {
    width: 100%;
    height: auto;
    display: block;
    filter: drop-shadow(0 8px 24px rgba(0,0,0,0.13));
    border-radius: 4px;
  }

  .face-close {
    position: relative;
  }

  .face-open {
    position: absolute;
    top: 0;
    left: 0;
    transform: rotateY(-180deg);
  }

  /* ---- 提示箭头 ---- */
  .hint-arrow {
    position: absolute;
    bottom: 18%;
    right: 2%;
    transform: none;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    pointer-events: none;
    animation: arrowFloat 1.6s ease-in-out infinite;
    transition: opacity 0.4s ease;
  }

  .hint-arrow svg {
    width: 28px;
    height: 28px;
    opacity: 0.72;
  }

  .hint-label {
    font-size: 18px;
    color: #7a6f5a;
    letter-spacing: 1px;
    white-space: nowrap;
  }

  .flip-scene.opened .hint-arrow {
    opacity: 0;
  }

  @keyframes arrowFloat {
    0%, 100% { transform: translateX(0px); }
    50%       { transform: translateX(-7px); }
  }

  .flip-scene.opened .face-open img {
    animation: shimmer 0.5s ease 0.5s both;
  }

  @keyframes shimmer {
    0%   { filter: drop-shadow(0 8px 24px rgba(0,0,0,0.13)) brightness(1.18); }
    100% { filter: drop-shadow(0 8px 24px rgba(0,0,0,0.13)) brightness(1); }
  }

  /* ---- 右侧按钮组 ---- */
  .side-buttons {
    position: fixed;
    right: 36px;
    top: 50%;
    transform: translateY(-50%);
    display: flex;
    flex-direction: column;
    gap: 14px;
    z-index: 10;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.5s ease 0.3s;
  }

  .side-buttons.visible {
    opacity: 1;
    pointer-events: auto;
  }

  .side-btn {
    font-family: "PFanHuTu", "KaiTi", "STKaiti", serif;
    font-size: 20px;
    font-weight: 700;
    color: #2b2a26;
    background: #fffdf8;
    border: 3.5px solid #2b2a26;
    border-radius: 3px;
    padding: 10px 22px;
    cursor: pointer;
    letter-spacing: 2px;
    filter: url(#hand-drawn);
    transition: transform 0.15s ease, box-shadow 0.15s ease, background 0.15s ease;
    white-space: nowrap;
    user-select: none;
  }

  .side-btn:hover {
    transform: translate(-2px, -2px) rotate(-0.5deg);
    box-shadow: 3px 4px 0 rgba(0,0,0,0.12);
    background: #fbf2bf;
  }

  .side-btn:active {
    transform: translate(0px, 0px);
    box-shadow: none;
  }

  /* ---- 截图闪屏效果 ---- */
  .screenshot-flash {
    position: fixed;
    inset: 0;
    background: white;
    z-index: 9999;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.1s ease;
  }
  .screenshot-flash.active {
    opacity: 1;
    transition: opacity 0s;
  }

  .screenshot-thumb {
    position: fixed;
    bottom: 28px;
    left: 28px;
    z-index: 9998;
    width: 130px;
    opacity: 0;
    transform: scale(0.55) translateY(24px);
    transition: all 0.45s cubic-bezier(0.34, 1.56, 0.64, 1);
    border-radius: 10px;
    box-shadow: 0 12px 38px rgba(0,0,0,0.28);
    pointer-events: none;
  }
  .screenshot-thumb.show {
    opacity: 1;
    transform: scale(1) translateY(0);
  }
  .screenshot-thumb img {
    width: 100%;
    display: block;
    border-radius: 10px;
  }

  /* ---- 礼花 canvas ---- */
  #confetti-canvas {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 999;
  }

  /* ---- 背景细纹（纸质感） ---- */
  body::before {
    content: "";
    position: fixed;
    inset: 0;
    background-image:
      repeating-linear-gradient(
        0deg,
        transparent,
        transparent 31px,
        rgba(180,160,120,0.07) 31px,
        rgba(180,160,120,0.07) 32px
      );
    pointer-events: none;
    z-index: 0;
  }

  .flip-scene {
    z-index: 1;
  }
</style>
</head>
<body>

  <canvas id="confetti-canvas"></canvas>

  <!-- 右侧功能按钮，翻开后显示 -->
  <div class="side-buttons" id="sideButtons">
    <button class="side-btn" id="btn-save">保存</button>
    <button class="side-btn" id="btn-share">分享</button>
    <button class="side-btn" id="btn-gallery">图鉴</button>
  </div>

  <div class="flip-scene" id="flipScene">
    <div class="flip-card" id="flipCard">

      <!-- 正面：合上的文件夹 -->
      <div class="flip-face face-close">
        <img src="01close_champion.png" alt="最终结局 · 世界冠军（合上）" draggable="false" />
      </div>

      <!-- 背面：翻开的文件夹 -->
      <div class="flip-face face-open">
        <img src="01open_champion.png" alt="最终结局 · 世界冠军（翻开）" draggable="false" />
      </div>
    </div>

    <!-- 浮动箭头提示 -->
    <div class="hint-arrow" id="hintArrow">
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M20 12 C20 11.8 19.7 11.6 19.4 11.6 L7.8 11.6 L11 8.4 C11.3 8.1 11.3 7.6 11 7.3 C10.7 7 10.2 7 9.9 7.3 L5.7 11.5 C5.5 11.6 5.4 11.8 5.4 12 C5.4 12.2 5.5 12.4 5.7 12.5 L9.9 16.7 C10.2 17 10.7 17 11 16.7 C11.3 16.4 11.3 15.9 11 15.6 L7.8 12.4 L19.4 12.4 C19.7 12.4 20 12.2 20 12 Z"
              fill="#8b7355" />
      </svg>
      <span class="hint-label">点击翻开</span>
    </div>
  </div>

  <script>
    /* ============================================================
       翻转交互
    ============================================================ */
    const scene = document.getElementById('flipScene');
    let isOpen = false;

    function openCard() {
      if (isOpen) return;
      isOpen = true;
      scene.classList.add('opened');
      setTimeout(() => {
        launchConfetti();
        document.getElementById('sideButtons').classList.add('visible');
      }, 880);
    }

    scene.addEventListener('click', openCard);
    scene.addEventListener('touchend', (e) => {
      e.preventDefault();
      openCard();
    }, { passive: false });

    /* ============================================================
       保存 / 分享：截图闪屏 + 左下角缩略图动效
    ============================================================ */
    function triggerScreenshotEffect() {
      const openImg = scene.querySelector(".face-open img");
      const flash = document.createElement("div");
      flash.className = "screenshot-flash";
      document.body.appendChild(flash);
      requestAnimationFrame(() => {
        flash.classList.add("active");
        setTimeout(() => flash.classList.remove("active"), 120);
        setTimeout(() => flash.remove(), 420);
      });
      if (openImg) {
        const thumb = document.createElement("div");
        thumb.className = "screenshot-thumb";
        const img = document.createElement("img");
        img.src = openImg.src;
        thumb.appendChild(img);
        document.body.appendChild(thumb);
        requestAnimationFrame(() => thumb.classList.add("show"));
        setTimeout(() => thumb.classList.remove("show"), 2200);
        setTimeout(() => thumb.remove(), 2800);
      }
    }

    document.getElementById("btn-save")?.addEventListener("click", (e) => {
      e.stopPropagation();
      triggerScreenshotEffect();
    });
    document.getElementById("btn-share")?.addEventListener("click", (e) => {
      e.stopPropagation();
      triggerScreenshotEffect();
    });
    document.getElementById("btn-gallery")?.addEventListener("click", (e) => {
      e.stopPropagation();
    });

    /* ============================================================
       礼花系统
    ============================================================ */
    const canvas = document.getElementById('confetti-canvas');
    const ctx    = canvas.getContext('2d');

    const COLORS = [
      '#FFD700', '#FF4136', '#0074D9', '#2ECC40',
      '#B10DC9', '#FF69B4', '#FF851B', '#FFFFFF'
    ];

    const SHAPES = ['rect', 'circle', 'ribbon'];

    let particles = [];
    let rafId = null;

    function resizeCanvas() {
      canvas.width  = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);

    function randBetween(a, b) { return a + Math.random() * (b - a); }
    function randItem(arr)      { return arr[Math.floor(Math.random() * arr.length)]; }

    function createBurst(cx, cy, count) {
      for (let i = 0; i < count; i++) {
        const angle  = Math.random() * Math.PI * 2;
        const speed  = randBetween(2, 9);
        particles.push({
          x:      cx,
          y:      cy,
          vx:     Math.cos(angle) * speed,
          vy:     Math.sin(angle) * speed - randBetween(1, 4),
          gravity: randBetween(0.06, 0.13),
          color:  randItem(COLORS),
          shape:  randItem(SHAPES),
          w:      randBetween(7, 14),
          h:      randBetween(4, 9),
          rot:    Math.random() * Math.PI * 2,
          rotV:   randBetween(-0.06, 0.06),
          alpha:  1,
          decay:  randBetween(0.0015, 0.004),
          drag:   randBetween(0.985, 0.998),
        });
      }
    }

    function launchConfetti() {
      particles = [];

      const W = canvas.width;
      const H = canvas.height;

      createBurst(W / 2, H * 0.42, 200);

      setTimeout(() => createBurst(W * 0.15, H * 0.35, 100), 400);
      setTimeout(() => createBurst(W * 0.85, H * 0.35, 100), 700);
      setTimeout(() => createBurst(W * 0.3,  H * 0.5,  80),  1100);
      setTimeout(() => createBurst(W * 0.7,  H * 0.5,  80),  1400);
      setTimeout(() => createBurst(W / 2,    H * 0.3,  120), 1800);
      setTimeout(() => createBurst(W * 0.2,  H * 0.6,  70),  2300);
      setTimeout(() => createBurst(W * 0.8,  H * 0.6,  70),  2600);

      if (rafId) cancelAnimationFrame(rafId);
      tick();
    }

    function drawParticle(p) {
      ctx.save();
      ctx.globalAlpha = p.alpha;
      ctx.fillStyle   = p.color;
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rot);

      if (p.shape === 'circle') {
        ctx.beginPath();
        ctx.arc(0, 0, p.w / 2, 0, Math.PI * 2);
        ctx.fill();
      } else if (p.shape === 'ribbon') {
        ctx.beginPath();
        ctx.ellipse(0, 0, p.w / 2, p.h / 4, 0, 0, Math.PI * 2);
        ctx.fill();
      } else {
        ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
      }

      ctx.restore();
    }

    function tick() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      particles = particles.filter(p => p.alpha > 0.02);

      for (const p of particles) {
        p.vx *= p.drag;
        p.vy *= p.drag;
        p.vy += p.gravity;
        p.x  += p.vx;
        p.y  += p.vy;
        p.rot += p.rotV;
        p.alpha -= p.decay;
        drawParticle(p);
      }

      if (particles.length > 0) {
        rafId = requestAnimationFrame(tick);
      } else {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
      }
    }
  </script>

</body>
</html>
