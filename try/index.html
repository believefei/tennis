<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tennis Try</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="page">
    <header class="hero">
      <p class="eyebrow">Rough Tennis Study</p>
      <h1>Try A Swing</h1>
      <p class="deck">手绘感线条、纸面质感和滚动叙事式的小动效，继续往“Pudding 风格”推进一步。</p>
    </header>

    <section class="stage-shell">
      <div id="stage">
        <canvas id="c-bg"></canvas>
        <canvas id="c-figure" class="layer"></canvas>
        <canvas id="c-ball" class="layer"></canvas>
        <canvas id="c-fx" class="layer"></canvas>
      </div>
    </section>

    <footer class="meta">
      <p>点击画面或按空格，让小人挥拍。球会带着拖尾被击飞。</p>
    </footer>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/roughjs@4.6.6/bundled/rough.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
  <script src="sketch.js"></script>
</body>
</html>
